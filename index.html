<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Tiska Enterprises | Boutique Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <div class="logo-box">
            <img src="tiska_logo.jpg" alt="Tiska Logo">
        </div>
        <nav class="mobile-nav-scroll">
            <ul id="nav-list"></ul>
        </nav>
    </div>
</header>

<main id="gallery-root"></main>

<footer>
    <div class="footer-content">
        <p>&copy; 2026 Tiska Enterprises. All Rights Reserved.</p>
        <p class="footer-sub">Premium Clothing & Rental Boutique Collection</p>
    </div>
</footer>

<div id="zoom-overlay">
    <div class="close-zoom" id="close-zoom-btn" aria-label="Close Gallery View">&times;</div>
    <div id="zoom-track"></div>
</div>

<a href="https://wa.me/919993636912" class="wa-float" target="_blank" aria-label="Inquire on WhatsApp">
    <svg width="28" height="28" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.195-1.103a7.859 7.859 0 0 0 3.792.98h.004c4.367 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
</a>

<div id="admin-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10005; justify-content:center; align-items:center; padding:16px;">
    <div style="background:#FFF; padding:24px; border-radius:12px; width:100%; max-width:340px; box-shadow:0 10px 25px rgba(0,0,0,0.3);">
        <h3 style="font-family:'Playfair Display', serif; margin-bottom:16px; font-size:1.4rem;">Add Temporary Item</h3>
        
        <div id="auth-step">
            <label style="font-size:0.8rem; font-weight:600; display:block; margin-bottom:6px;">ENTER AUTHORIZATION CODE</label>
            <input type="password" id="admin-pin" style="width:100%; height:44px; padding:10px; border:1px solid #CCC; border-radius:6px; margin-bottom:16px; font-size:1rem; text-align:center; letter-spacing:4px;">
            <button id="btn-verify-pin" class="wa-order-btn" style="margin-top:0;">VERIFY CODE</button>
        </div>

        <div id="upload-step" style="display:none;">
            <label style="font-size:0.8rem; font-weight:600; display:block; margin-bottom:6px;">SELECT TARGET CATEGORY</label>
            <select id="upload-category" style="width:100%; height:44px; padding:10px; border:1px solid #CCC; border-radius:6px; margin-bottom:16px; font-size:0.9rem; background:#FFF; font-weight:600;">
            </select>

            <label style="font-size:0.8rem; font-weight:600; display:block; margin-bottom:6px;">CHOOSE IMAGE FILE</label>
            <input type="file" id="upload-file" accept="image/*" style="width:100%; margin-bottom:20px; font-size:0.85rem;">
            <button id="btn-submit-upload" class="wa-order-btn" style="margin-top:0; background:#846B43;">INJECT TO GALLERY</button>
        </div>

        <button id="btn-close-modal" style="background:none; border:none; color:#666; font-size:0.85rem; font-weight:600; width:100%; text-align:center; margin-top:16px; cursor:pointer; text-decoration:underline;">Cancel</button>
    </div>
</div>

<button id="admin-trigger-fab" style="position:fixed; bottom:90px; right:20px; width:54px; height:54px; background:#232323; color:#FFF; border:none; border-radius:50%; font-size:1.8rem; display:flex; align-items:center; justify-content:center; z-index:850; box-shadow:0 4px 16px rgba(0,0,0,0.2); cursor:pointer; font-weight:300;">+</button>

<script src="script.js"></script>
</body>
</html>
